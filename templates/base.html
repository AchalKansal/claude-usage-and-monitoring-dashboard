<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Claude Usage Monitor{% endblock %}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --surface2: #252841;
      --border: #2e3150;
      --accent: #7c6af7;
      --accent2: #4fc3f7;
      --text: #e2e8f0;
      --muted: #8892a4;
      --green: #4ade80;
      --yellow: #fbbf24;
      --red: #f87171;
      --orange: #fb923c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* NAV */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 32px;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-brand span { font-size: 20px; }
    .nav-links { display: flex; gap: 4px; }
    .nav-links a {
      padding: 6px 14px;
      border-radius: 6px;
      color: var(--muted);
      font-weight: 500;
      transition: all 0.15s;
    }
    .nav-links a:hover, .nav-links a.active {
      background: var(--surface2);
      color: var(--text);
      text-decoration: none;
    }
    .nav-spacer { flex: 1; }
    .rescan-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    .rescan-btn:hover { background: var(--accent); border-color: var(--accent); }

    /* LAYOUT */
    .page { max-width: 1280px; margin: 0 auto; padding: 32px 24px; }
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 22px; font-weight: 700; }
    .page-header p { color: var(--muted); margin-top: 4px; }

    /* CARDS */
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .card-label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .card-value { font-size: 26px; font-weight: 700; margin-top: 6px; }
    .card-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }

    /* GRID */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }

    /* PANEL */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .panel-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text);
    }

    /* TABLE */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left;
      padding: 10px 12px;
      color: var(--muted);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    /* BADGES */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-purple { background: rgba(124,106,247,0.2); color: var(--accent); }
    .badge-blue   { background: rgba(79,195,247,0.2); color: var(--accent2); }
    .badge-green  { background: rgba(74,222,128,0.2); color: var(--green); }
    .badge-yellow { background: rgba(251,191,36,0.2); color: var(--yellow); }
    .badge-red    { background: rgba(248,113,113,0.2); color: var(--red); }

    /* TOKEN BAR */
    .token-bar-wrap { display: flex; align-items: center; gap: 10px; }
    .token-bar { height: 6px; border-radius: 3px; background: var(--surface2); flex: 1; overflow: hidden; }
    .token-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); }

    /* PROMPT CARD */
    .prompt-box {
      background: var(--surface2);
      border-radius: 8px;
      padding: 12px;
      font-family: monospace;
      font-size: 12px;
      color: var(--muted);
      max-height: 120px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      margin-top: 8px;
    }

    /* SUGGESTION */
    .suggestion {
      background: rgba(124,106,247,0.08);
      border: 1px solid rgba(124,106,247,0.25);
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 8px;
      font-size: 13px;
    }
    .suggestion-type {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .suggestion-savings {
      color: var(--green);
      font-size: 12px;
      margin-top: 4px;
    }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-ghost { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { background: var(--border); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* LOADING */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 18px;
      font-size: 13px;
      display: none;
      z-index: 999;
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-brand"><span>⚡</span> Claude Monitor</div>
    <div class="nav-links">
      <a href="/" id="nav-dashboard">Dashboard</a>
      <a href="/sessions" id="nav-sessions">Sessions</a>
      <a href="/top-prompts" id="nav-top">Top Prompts</a>
    </div>
    <div class="nav-spacer"></div>
    <button class="rescan-btn" onclick="rescan()">↻ Rescan</button>
  </nav>

  <div class="page">
    {% block content %}{% endblock %}
  </div>

  <div id="toast"></div>

  <script>
    // Highlight active nav link
    const path = window.location.pathname;
    if (path === '/') document.getElementById('nav-dashboard').classList.add('active');
    else if (path.startsWith('/sessions')) document.getElementById('nav-sessions').classList.add('active');
    else if (path.startsWith('/top-prompts')) document.getElementById('nav-top').classList.add('active');

    function showToast(msg, ms = 3000) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', ms);
    }

    async function rescan() {
      showToast('Rescanning sessions…');
      const r = await fetch('/api/rescan');
      const d = await r.json();
      showToast(`Done. ${d.new_messages} new message(s) imported.`);
      setTimeout(() => location.reload(), 1500);
    }

    function fmt(n) {
      if (n == null) return '—';
      if (n >= 1_000_000) return (n/1_000_000).toFixed(1) + 'M';
      if (n >= 1_000) return (n/1_000).toFixed(1) + 'K';
      return String(n);
    }

    function fmtCost(c) {
      if (c == null || c === 0) return '$0.00';
      if (c < 0.001) return '$' + c.toFixed(6);
      return '$' + c.toFixed(4);
    }

    function modelBadge(model) {
      if (!model) return '';
      const m = model.toLowerCase();
      if (m.includes('opus'))   return `<span class="badge badge-red">${model}</span>`;
      if (m.includes('sonnet')) return `<span class="badge badge-purple">${model}</span>`;
      if (m.includes('haiku'))  return `<span class="badge badge-green">${model}</span>`;
      return `<span class="badge badge-blue">${model}</span>`;
    }

    function timeAgo(ts) {
      if (!ts) return '—';
      const diff = Date.now() - new Date(ts).getTime();
      const s = Math.floor(diff / 1000);
      if (s < 60) return s + 's ago';
      if (s < 3600) return Math.floor(s/60) + 'm ago';
      if (s < 86400) return Math.floor(s/3600) + 'h ago';
      return Math.floor(s/86400) + 'd ago';
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
